<!DOCTYPE html>
<html lang="pt-BR" class="h-full bg-slate-950 text-slate-100 font-inter">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tem Pontinho</title>
    <link rel="canonical" href="https://tempontinho.com/login.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Tem Pontinho">
    <meta property="og:locale" content="pt_BR">
    <meta property="og:url" content="https://tempontinho.com/login.html">
    <meta property="og:title" content="Login - Tem Pontinho">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glassmorphism {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        /* X-03: foco de teclado sempre visível (só em navegação por teclado, não no clique). */
        :focus-visible {
            outline: 2px solid #818cf8 !important;
            outline-offset: 2px !important;
            border-radius: 6px;
        }
    </style>
</head>
<body class="h-full flex flex-col justify-center items-center overflow-x-hidden selection:bg-indigo-500 selection:text-white p-4">

    <!-- Toast Notification -->
    <div id="toast" class="hidden fixed top-5 right-5 bg-indigo-600 text-white px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3 transition-all duration-300 z-50">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toast-text" class="text-sm font-medium"></span>
    </div>

    <div class="glassmorphism rounded-3xl p-8 max-w-md w-full shadow-2xl relative overflow-hidden border border-slate-800">
        <!-- Glow effect -->
        <div class="absolute -top-32 -left-32 w-64 h-64 bg-indigo-600 rounded-full blur-[100px] opacity-20 pointer-events-none"></div>

        <div class="text-center mb-8 relative z-10">
            <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-tr from-indigo-500 to-violet-600 flex items-center justify-center shadow-lg shadow-indigo-500/30">
                <i class="fa-solid fa-gem text-white text-3xl"></i>
            </div>
            <h2 class="text-3xl font-bold font-outfit text-white tracking-tight">Bem-vindo de volta</h2>
            <p class="text-slate-400 text-sm mt-2">Acesse seu painel administrativo.</p>
        </div>

        <form id="auth-form" class="flex flex-col gap-4 relative z-10">
            <!-- Social Sign-ins -->
            <div class="grid grid-cols-1 gap-3 mb-2">
                <button type="button" id="btn-login-google" class="flex items-center justify-center gap-3 py-3.5 px-4 rounded-xl bg-white text-slate-900 hover:bg-slate-100 transition shadow-sm font-semibold">
                    <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" class="w-5" alt="Google">
                    Entrar com o Google
                </button>
            </div>

            <div class="flex items-center my-1">
                <div class="h-[1px] flex-grow bg-slate-800"></div>
                <span class="px-3 text-xs text-slate-500 uppercase tracking-widest">ou use e-mail</span>
                <div class="h-[1px] flex-grow bg-slate-800"></div>
            </div>

            <div class="flex flex-col gap-1.5">
                <label for="owner-email" class="text-xs font-semibold text-slate-400 uppercase tracking-wider">E-mail</label>
                <input type="email" id="owner-email" placeholder="nome@empresa.com" required class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-white transition">
            </div>
            <div class="flex flex-col gap-1.5">
                <div class="flex justify-between items-center">
                    <label for="owner-password" class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Senha</label>
                    <button type="button" id="btn-forgot-password" class="text-[11px] text-indigo-400 hover:underline">Esqueceu a senha?</button>
                </div>
                <input type="password" id="owner-password" placeholder="Sua senha" required class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-white transition">
            </div>

            <button type="submit" id="btn-submit-login" class="mt-4 w-full py-4 bg-gradient-to-r from-indigo-500 to-violet-600 hover:from-indigo-600 hover:to-violet-700 font-bold text-white rounded-xl shadow-lg shadow-indigo-500/30 active:scale-[0.98] transition duration-200">
                Acessar Painel
            </button>
            
            <p class="text-center text-[11px] text-slate-500 mt-1 leading-relaxed">
                Ao entrar, você concorda com os
                <a href="termos.html" class="text-slate-400 hover:text-indigo-400 hover:underline">Termos de Uso</a> e a
                <a href="privacidade.html" class="text-slate-400 hover:text-indigo-400 hover:underline">Política de Privacidade</a>.
            </p>

            <p class="text-center text-sm text-slate-400 mt-4">
                Ainda não tem conta? <a href="onboarding.html" class="text-indigo-400 font-semibold hover:underline">Criar conta grátis</a>
            </p>
        </form>
    </div>
    
    <div class="mt-8 text-center text-xs text-slate-600">
        <a href="index.html" class="hover:text-slate-400 transition">&larr; Voltar para a página inicial</a>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
        import {
            auth,
            signInWithEmailAndPassword,
            sendPasswordResetEmail,
            loginWithGoogle,
            loginWithGoogleRedirect,
            getRedirectResult
        } from "./config.js?v=3";

        const authForm = document.getElementById("auth-form");
        const emailInput = document.getElementById("owner-email");
        const passwordInput = document.getElementById("owner-password");
        const btnSubmitLogin = document.getElementById("btn-submit-login");

        const toast = document.getElementById("toast");
        const toastText = document.getElementById("toast-text");

        function showToast(message) {
            toastText.innerText = message;
            toast.classList.remove("hidden");
            toast.classList.add("flex");
            setTimeout(() => {
                toast.classList.add("hidden");
                toast.classList.remove("flex");
            }, 3000);
        }

        // Finaliza redirect do mobile
        try {
            await getRedirectResult(auth);
        } catch (err) {
            console.error("Erro no redirecionamento:", err);
            showToast("Erro no login: " + err.message);
        }

        // Verifica se voltou de um redirecionamento ou se já tem sessão
        auth.onAuthStateChanged((user) => {
            if (user) {
                showToast("Sessão encontrada! Redirecionando...");
                setTimeout(() => {
                    window.location.href = `./dashboard.html?empresa=${user.uid}`;
                }, 1000);
            }
        });

        // Email / Senha Login
        authForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            btnSubmitLogin.disabled = true;
            btnSubmitLogin.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Acessando...`;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                // O onAuthStateChanged vai capturar e redirecionar
            } catch (err) {
                console.error(err);
                showToast("Erro: E-mail ou senha incorretos.");
                btnSubmitLogin.disabled = false;
                btnSubmitLogin.innerText = "Acessar Painel";
            }
        });

        // B-05: Reset de senha real
        document.getElementById("btn-forgot-password").addEventListener("click", async () => {
            const email = emailInput.value.trim();
            if (!email) {
                showToast("Digite seu e-mail no campo acima primeiro.");
                emailInput.focus();
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                showToast("Enviamos um link de redefinição para seu e-mail.");
            } catch (err) {
                console.error(err);
                // Não revela se o e-mail existe (privacidade), mas avisa erros de formato.
                if (err.code === "auth/invalid-email") {
                    showToast("E-mail inválido. Confira e tente de novo.");
                } else {
                    showToast("Se o e-mail estiver cadastrado, o link foi enviado.");
                }
            }
        });

        // Google Login — popup no desktop, redirect no mobile
        document.getElementById("btn-login-google").addEventListener("click", async () => {
            const btn = document.getElementById("btn-login-google");
            btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Conectando...`;
            try {
                const isMobile = /Mobi|Android/i.test(navigator.userAgent);
                if (isMobile) {
                    await loginWithGoogleRedirect();
                } else {
                    await loginWithGoogle();
                    // onAuthStateChanged cuida do redirect
                }
            } catch (err) {
                console.error(err);
                showToast("Erro ao fazer login com Google.");
                btn.innerHTML = `<img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" class="w-5" alt="Google"> Entrar com o Google`;
            }
        });
    </script>
</body>
</html>
