<!DOCTYPE html>
<html lang="pt-BR" class="h-full font-inter" style="background-color: #2A5A44;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Animações - Fidelidade</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: { paper:'#F4EFE6', surface:'#FFFFFF', ink:'#2A2520', green:'#2A5A44', accent:'#D96B43' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- QRCode.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        .glassmorphism {
            background: #FFFFFF;
            border: 1px solid #E3DBCC;
            box-shadow: 0 8px 24px rgba(42, 37, 32, 0.08);
        }
        
        .reward-pulse { animation: reward-pulse 2.2s ease-in-out infinite; }
        @keyframes reward-pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(217, 107, 67, 0.35); }
            50%      { transform: scale(1.015); box-shadow: 0 0 0 10px rgba(217, 107, 67, 0); }
        }

        .stamp-pop { animation: stamp-pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes stamp-pop {
            0%   { transform: scale(0.4); opacity: 0.3; }
            60%  { transform: scale(1.18); }
            100% { transform: scale(1.1); opacity: 1; }
        }

        /* Animação de comemoração: Pontos girando 360 graus e pulsando */
        .dance-stamp { 
            animation: dance-spin 1.5s linear infinite; 
            display: inline-block; 
            transform-origin: center center;
        }
        @keyframes dance-spin {
            0%   { transform: scale(1.1) rotate(0deg); }
            50%  { transform: scale(1.25) rotate(180deg); }
            100% { transform: scale(1.1) rotate(360deg); }
        }
    </style>
</head>
<body class="h-full flex flex-col justify-between overflow-x-hidden p-4 font-sans relative text-white" style="background-color: #2A5A44;">

    <!-- Container de Partículas Dançantes (Atrás de tudo, z-10) -->
    <div id="particles-container" class="fixed inset-0 pointer-events-none z-10 overflow-hidden"></div>

    <!-- Control Panel (For Testing Only) -->
    <div class="fixed top-2 left-2 z-50 bg-white p-3 rounded-xl shadow-lg border border-stone-200 text-xs flex flex-col gap-2 w-48">
        <h3 class="font-bold text-stone-700 text-center border-b pb-1">Controles de Teste</h3>
        <button onclick="testLanding()" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 px-3 py-2 rounded-lg font-medium transition">
            <i class="fa-solid fa-plus mr-1"></i> Adicionar Ponto
        </button>
        <button onclick="testRemove()" class="bg-red-100 hover:bg-red-200 text-red-700 px-3 py-2 rounded-lg font-medium transition">
            <i class="fa-solid fa-minus mr-1"></i> Remover Ponto
        </button>
        <button onclick="testVictory()" class="bg-amber-100 hover:bg-amber-200 text-amber-700 px-3 py-2 rounded-lg font-medium transition">
            <i class="fa-solid fa-gift mr-1"></i> Animação Completar
        </button>
        <button onclick="resetCard()" class="bg-stone-100 hover:bg-stone-200 text-stone-700 px-3 py-2 rounded-lg font-medium transition mt-1">
            <i class="fa-solid fa-rotate-left mr-1"></i> Resetar Cartão
        </button>
    </div>

    <!-- Main Container -->
    <main class="flex-grow flex items-center justify-center py-6 w-full max-w-sm mx-auto mt-12">
        <div id="app-screen" class="w-full flex flex-col gap-5 text-center">
            
            <div class="flex flex-col items-center gap-1.5 mt-2">
                <div class="w-10 h-10 rounded-full bg-white text-brand-green flex items-center justify-center text-lg shadow-sm">✶</div>
                <h2 class="font-bold text-lg text-white leading-tight">Clube de Fidelidade</h2>
            </div>

            <div class="glassmorphism rounded-3xl p-6 flex flex-col items-center gap-4 relative z-30">
                <div class="bg-white p-3 rounded-2xl flex items-center justify-center shrink-0 border border-stone-200 shadow-sm relative z-50" id="qrcode-box">
                    <div id="qrcode-placeholder"></div>
                </div>
                <div class="flex flex-col gap-1">
                    <p class="text-xs text-stone-800 font-semibold">Seu QR Code de Pontuação</p>
                </div>
            </div>

            <div id="victory-banner" class="hidden p-4 rounded-2xl border-2 border-brand-accent bg-white text-brand-accent-dark flex flex-col items-center gap-2 text-center relative z-30 shadow-md">
                <h4 class="font-bold text-sm uppercase tracking-wider"><i class="fa-solid fa-gift mr-1.5"></i>🎉 Você ganhou um prêmio!</h4>
            </div>

            <div id="loyalty-card" class="rounded-3xl p-5 flex flex-col gap-4 shadow-2xl border border-white/10 text-white relative z-30" style="background-color:#2A5A44;">
                <div class="flex justify-between items-center text-xs border-b border-white/20 pb-3">
                    <span class="text-white/80 font-medium">Pontuação Acumulada</span>
                    <span id="points-counter" class="font-bold text-white bg-white/15 px-2.5 py-1 rounded-lg">0 / 10</span>
                </div>

                <div id="stamps-grid" class="grid grid-cols-5 gap-2.5 py-3 justify-center">
                    <!-- Gerado via JS -->
                </div>

                <div class="p-3 bg-white/10 border border-white/20 rounded-2xl text-xs text-white/90 leading-relaxed font-medium">
                    Meta de <span class="font-bold underline text-white">10</span> carimbos =
                    <span class="font-bold text-amber-200">Prêmio Especial</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        const metaPontos = 10;
        const brandEmoji = "⭐";
        let currentPoints = 0;

        // Render QRCode
        new QRCode(document.getElementById("qrcode-placeholder"), {
            text: "test-user-id", width: 140, height: 140, correctLevel: QRCode.CorrectLevel.M
        });

        // Initialize empty card
        renderStamps(0, false);

        function setCounter(p) {
            document.getElementById("points-counter").innerText = `${p} / ${metaPontos}`;
        }

        function renderStamps(pointsCount, isVictory = false) {
            const grid = document.getElementById("stamps-grid");
            grid.innerHTML = "";
            grid.className = "grid grid-cols-5 gap-2 py-3 justify-center";

            for (let i = 1; i <= metaPontos; i++) {
                const stamp = document.createElement("div");
                stamp.id = `stamp-slot-${i}`;
                const isStamped = i <= pointsCount;
                
                const emojiSpanClass = isVictory ? "dance-stamp text-3xl filter drop-shadow-[0_2px_8px_rgba(0,0,0,0.25)]" : "text-3xl filter drop-shadow-[0_2px_8px_rgba(0,0,0,0.25)]";

                stamp.className = `w-10 h-10 flex items-center justify-center font-bold transition-all duration-300 ${
                    isStamped
                        ? "bg-transparent border-transparent scale-110"
                        : "rounded-full border-2 bg-white/15 text-white/60 border-white/25 text-xs"
                }`;

                stamp.innerHTML = isStamped
                    ? `<span class="${emojiSpanClass}">${brandEmoji}</span>`
                    : `${i}`;

                grid.appendChild(stamp);
            }
        }

        function playLandingAnimation(pointIndex) {
            const giantEmoji = document.createElement("div");
            giantEmoji.innerText = brandEmoji;
            giantEmoji.style.position = "fixed";
            giantEmoji.style.zIndex = "9999";
            giantEmoji.style.pointerEvents = "none";
            giantEmoji.style.left = "50%";
            giantEmoji.style.top = "50%";
            giantEmoji.style.transform = "translate(-50%, -50%) scale(20)";
            giantEmoji.style.opacity = "0";
            giantEmoji.style.transition = "all 0.1s ease-out";
            
            document.body.appendChild(giantEmoji);
            giantEmoji.offsetWidth; // force reflow
            
            giantEmoji.style.opacity = "1";
            giantEmoji.style.transform = "translate(-50%, -50%) scale(20)";
            
            setTimeout(() => {
                const targetSlot = document.getElementById(`stamp-slot-${pointIndex}`);
                if (targetSlot) {
                    const rect = targetSlot.getBoundingClientRect();
                    giantEmoji.style.transition = "all 0.4s cubic-bezier(0.25, 1, 0.5, 1)";
                    giantEmoji.style.left = `${rect.left + rect.width / 2}px`;
                    giantEmoji.style.top = `${rect.top + rect.height / 2}px`;
                    giantEmoji.style.transform = "translate(-50%, -50%) scale(0.3) rotate(360deg)";
                    giantEmoji.style.opacity = "0.2";
                }
            }, 700);
            
            setTimeout(() => {
                giantEmoji.remove();
                renderStamps(currentPoints, false);
            }, 1100);
        }

        let isCelebrating = false;
        let particleInterval;

        function fireVictoryConfetti() {
            if (isCelebrating) return;
            isCelebrating = true;
            
            const container = document.getElementById("particles-container");
            container.innerHTML = ""; // Limpa qualquer partícula velha
            
            // Atira 1 emoji a cada 200ms (dobro de partículas)
            particleInterval = setInterval(() => {
                if (!isCelebrating) {
                    clearInterval(particleInterval);
                    return;
                }
                
                const emoji = document.createElement("div");
                emoji.innerText = brandEmoji;
                emoji.className = "absolute text-3xl filter drop-shadow-md";
                
                // Posição inicial: parte inferior da tela, em um ponto horizontal aleatório
                const startX = Math.random() * window.innerWidth;
                emoji.style.left = startX + "px";
                emoji.style.bottom = "-50px";
                
                // Prepara a transição (dura 4 segundos voando para cima - 2x mais rápido)
                emoji.style.transition = "transform 4s linear, opacity 4s ease-out";
                container.appendChild(emoji);
                
                // Próximo frame: define o destino
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        const endY = -(window.innerHeight + 150); // Voa até passar do topo da tela
                        const endX = (Math.random() - 0.5) * 400; // Desvio horizontal maior
                        const rotate = (Math.random() - 0.5) * 720; // Gira mais vezes no caminho
                        
                        emoji.style.transform = `translate(${endX}px, ${endY}px) rotate(${rotate}deg)`;
                        emoji.style.opacity = "0"; // Desaparece no final
                    });
                });
                
                // Remove o elemento da tela depois que a transição acaba (4 segundos)
                setTimeout(() => {
                    if (emoji.parentNode) emoji.remove();
                }, 4000);
                
            }, 200);
        }

        // Test Functions
        function testLanding() {
            if (currentPoints >= metaPontos) return;
            currentPoints++;
            
            if (currentPoints === metaPontos) {
                testVictory(); // Aciona a festa automaticamente
            } else {
                setCounter(currentPoints);
                playLandingAnimation(currentPoints);
            }
        }

        function testRemove() {
            if (currentPoints <= 0) return;
            currentPoints--;
            setCounter(currentPoints);
            // Se caiu de 10 para 9, desliga a festa.
            if (currentPoints < metaPontos) {
                stopVictory();
            } else {
                renderStamps(currentPoints, true);
            }
        }

        function stopVictory() {
            isCelebrating = false;
            if (particleInterval) clearInterval(particleInterval);
            document.getElementById("particles-container").innerHTML = "";
            renderStamps(currentPoints, false);
            
            const banner = document.getElementById("victory-banner");
            banner.classList.add("hidden");
            banner.classList.remove("reward-pulse");
        }

        function testVictory() {
            currentPoints = metaPontos;
            setCounter(currentPoints);
            renderStamps(currentPoints, true);
            playLandingAnimation(currentPoints);
            
            const banner = document.getElementById("victory-banner");
            banner.classList.remove("hidden");
            banner.classList.add("reward-pulse");
            
            setTimeout(() => fireVictoryConfetti(), 1100);
        }

        function resetCard() {
            currentPoints = 0;
            setCounter(0);
            stopVictory();
        }
    </script>
</body>
</html>
